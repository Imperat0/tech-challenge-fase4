version: "3.9"

services:
  pipeline:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    command: python src/pipeline/orchestrator.py

  notebooks:
    build: .
    env_file: .env
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    command: >
      jupyter notebook
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --allow-root
        --NotebookApp.token=''
    working_dir: /app
